name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]
  schedule:
    - cron: "21 9 * * 1"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web-app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web-app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build check
        run: npm run build

      - name: Run unit tests with coverage
        run: npm test

  code-scanning-quality:
    name: Code Scanning / Quality
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: [javascript-typescript, python]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize CodeQL quality analysis
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}

      - name: Perform CodeQL quality analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: code-scanning-quality-${{ matrix.language }}

  code-scanning-security:
    name: Code Scanning / Security
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: [javascript-typescript, python]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        if: matrix.language == 'javascript-typescript'
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web-app/package-lock.json

      - name: Install Node dependencies
        if: matrix.language == 'javascript-typescript'
        working-directory: web-app
        run: npm ci

      - name: Audit production npm dependencies
        if: matrix.language == 'javascript-typescript'
        working-directory: web-app
        run: npm audit --omit=dev

      - name: Dependency review
        if: github.event_name == 'pull_request' && matrix.language == 'javascript-typescript'
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high

      - name: Initialize CodeQL security analysis
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          queries: security-extended

      - name: Perform CodeQL security analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: code-scanning-security-${{ matrix.language }}
